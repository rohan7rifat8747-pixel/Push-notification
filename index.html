<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glosax - Complete Push Notification System</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --accent: #2aabee;
            --accent-hover: #2291d6;
            --danger: #e74c3c;
            --success: #4caf50;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
            --shadow-lg: 0 16px 40px rgba(0,0,0,0.15);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 16px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            background: white;
            flex-shrink: 0;
        }
        .header-title {
            font-size: 1.15rem;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }
        .body-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: white;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            transition: all 0.2s;
            width: 100%;
        }
        .btn:hover {
            background: #f8f8f8;
        }
        .btn-accent {
            background: var(--accent);
            color: white;
            border: none;
        }
        .btn-accent:hover {
            background: var(--accent-hover);
        }
        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
        }
        .input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            outline: none;
            background: white;
        }
        .input:focus {
            border-color: var(--accent);
        }
        .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            background: white;
        }
        .flex-1 {
            flex: 1;
            min-width: 0;
        }
        .text-sm {
            font-size: 0.8rem;
            color: #888;
        }
        .text-xs {
            font-size: 0.7rem;
            color: #aaa;
        }
        .badge {
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 600;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-weight: 500;
        }
        .toast.show {
            opacity: 1;
        }
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
            background: #ddd;
            border-radius: 13px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            flex-shrink: 0;
        }
        .toggle-switch.active {
            background: var(--accent);
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .toggle-switch.active::after {
            left: 25px;
        }
        .notification-item {
            padding: 12px;
            border-left: 3px solid var(--accent);
            background: #f8fdff;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .copy-btn {
            cursor: pointer;
            color: var(--accent);
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .copy-btn:hover {
            background: #e3f2fd;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="container">
        <div class="header">
            <span class="header-title">🔔 Push Notification Center</span>
        </div>
        <div class="body-scroll">
            <!-- Enable Notifications -->
            <button class="btn btn-accent" id="enableBtn" onclick="enableNotifications()">
                🔔 Enable Push Notifications
            </button>

            <!-- Token Display -->
            <div class="label">Your FCM Token</div>
            <div class="card" style="word-break:break-all;">
                <span class="text-sm" id="tokenDisplay">Not generated yet</span>
                <span class="copy-btn" onclick="copyToken()">📋 Copy</span>
            </div>

            <!-- Permission Status -->
            <div class="label">Notification Status</div>
            <div class="card">
                <span class="flex-1">Permission:</span>
                <span id="permStatus" style="font-weight:600;">Unknown</span>
            </div>

            <!-- Send Notification Section -->
            <div class="label">Send Test Notification</div>
            <input class="input" id="notifTitle" placeholder="Notification Title...">
            <input class="input" id="notifBody" placeholder="Notification Message...">
            <button class="btn btn-accent" onclick="sendTestNotification()">
                📨 Send Notification to Me
            </button>

            <!-- Send to Specific User -->
            <div class="label">Send Notification to User</div>
            <input class="input" id="targetToken" placeholder="Paste target FCM Token...">
            <input class="input" id="targetTitle" placeholder="Title...">
            <input class="input" id="targetBody" placeholder="Message...">
            <button class="btn btn-accent" onclick="sendToUser()">
                📤 Send to User
            </button>

            <!-- Recent Notifications -->
            <div class="label">Recent Notifications</div>
            <div id="recentNotifs">
                <p class="text-sm" style="text-align:center;color:#aaa;">No notifications yet</p>
            </div>

            <!-- Toggle Notification Sound -->
            <div class="label">Settings</div>
            <div class="card">
                <span class="flex-1">Sound</span>
                <div class="toggle-switch active" id="soundToggle" onclick="toggleSound()"></div>
            </div>
            <div class="card">
                <span class="flex-1">Vibration</span>
                <div class="toggle-switch active" id="vibrateToggle" onclick="toggleVibrate()"></div>
            </div>

            <!-- Clear Token -->
            <button class="btn btn-danger" onclick="deleteToken()">
                🗑️ Delete My Token
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/firebase-messaging-sw.js')
                .then((reg) => console.log('✅ Service Worker registered:', reg.scope))
                .catch((err) => console.log('❌ Service Worker registration failed:', err));
        }
    </script>

    <script>
        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyA-I6gjwQgznigBOAxjbhJt3FNOmrAKrko",
            authDomain: "glosax-226f9.firebaseapp.com",
            databaseURL: "https://glosax-226f9-default-rtdb.firebaseio.com",
            projectId: "glosax-226f9",
            storageBucket: "glosax-226f9.firebasestorage.app",
            messagingSenderId: "640102700134",
            appId: "1:640102700134:web:a112dd40dd5c405c2409a7",
            measurementId: "G-D28E0NSN22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ===== VAPID KEY =====
        const VAPID_KEY = 'BCBpQ-Qo8iw-EJyY_EwF7oMChpHTDNsE_KrqJBc84XSjQOBb7yEFSojbXgJhS232I9Pr5ri0LX3Svgp7eZm1ujk';

        // ===== MESSAGING INIT =====
        let messaging = null;
        let currentToken = null;
        let soundEnabled = true;
        let vibrateEnabled = true;

        if (firebase.messaging && 'serviceWorker' in navigator && 'Notification' in window) {
            try {
                messaging = firebase.messaging();
                console.log('✅ Messaging initialized');
            } catch (e) {
                console.log('❌ Messaging init error:', e.message);
            }
        }

        // ===== UPDATE PERMISSION STATUS =====
        function updatePermStatus() {
            const el = document.getElementById('permStatus');
            if (!('Notification' in window)) {
                el.textContent = 'Not Supported';
                el.style.color = '#e74c3c';
                return;
            }
            switch (Notification.permission) {
                case 'granted':
                    el.textContent = '✅ Granted';
                    el.style.color = '#4caf50';
                    break;
                case 'denied':
                    el.textContent = '❌ Denied';
                    el.style.color = '#e74c3c';
                    break;
                default:
                    el.textContent = '⏳ Not Asked';
                    el.style.color = '#f5c542';
            }
        }
        updatePermStatus();

        // ===== ENABLE NOTIFICATIONS =====
        async function enableNotifications() {
            if (!messaging) {
                alert('Push notifications not supported in this browser');
                return;
            }
            try {
                const permission = await Notification.requestPermission();
                updatePermStatus();

                if (permission === 'granted') {
                    const swReg = await navigator.serviceWorker.getRegistration();
                    const token = await messaging.getToken({
                        vapidKey: VAPID_KEY,
                        serviceWorkerRegistration: swReg
                    });

                    if (token) {
                        currentToken = token;
                        console.log('✅ FCM Token:', token);
                        document.getElementById('tokenDisplay').textContent = token;

                        // Save token to Firebase Database
                        const userId = 'user_' + Date.now();
                        localStorage.setItem('glosax_push_uid', userId);
                        await db.ref('pushTokens/' + userId).set({
                            token: token,
                            platform: 'web',
                            userAgent: navigator.userAgent,
                            createdAt: new Date().toISOString(),
                            soundEnabled: soundEnabled,
                            vibrateEnabled: vibrateEnabled
                        });

                        document.getElementById('enableBtn').textContent = '✅ Notifications Enabled';
                        document.getElementById('enableBtn').style.background = '#4caf50';
                        showToast('✅ Push notifications enabled!');
                    } else {
                        showToast('❌ No token received');
                    }
                } else {
                    showToast('❌ Permission denied');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ Failed to enable notifications');
            }
        }

        // ===== COPY TOKEN =====
        function copyToken() {
            if (!currentToken) {
                showToast('No token to copy');
                return;
            }
            navigator.clipboard.writeText(currentToken).then(() => {
                showToast('📋 Token copied!');
            }).catch(() => {
                showToast('Failed to copy');
            });
        }

        // ===== SEND TEST NOTIFICATION =====
        async function sendTestNotification() {
            const title = document.getElementById('notifTitle').value.trim() || 'Glosax Test';
            const body = document.getElementById('notifBody').value.trim() || 'This is a test notification!';

            if (!currentToken) {
                showToast('❌ Enable notifications first!');
                return;
            }

            // Save to Firebase Database
            const notifRef = db.ref('notifications').push();
            await notifRef.set({
                token: currentToken,
                title: title,
                body: body,
                timestamp: Date.now(),
                status: 'sent'
            });

            // Add to recent list
            addRecentNotification(title, body);

            showToast('📨 Notification sent!');
            document.getElementById('notifTitle').value = '';
            document.getElementById('notifBody').value = '';
        }

        // ===== SEND TO SPECIFIC USER =====
        async function sendToUser() {
            const targetToken = document.getElementById('targetToken').value.trim();
            const title = document.getElementById('targetTitle').value.trim() || 'Glosax Message';
            const body = document.getElementById('targetBody').value.trim() || 'You have a new message!';

            if (!targetToken) {
                showToast('❌ Paste target FCM Token first!');
                return;
            }

            // Save to Firebase Database
            const notifRef = db.ref('notifications').push();
            await notifRef.set({
                token: targetToken,
                title: title,
                body: body,
                timestamp: Date.now(),
                status: 'sent',
                sender: currentToken || 'anonymous'
            });

            addRecentNotification('To User: ' + title, body);
            showToast('📤 Notification sent to user!');
            document.getElementById('targetTitle').value = '';
            document.getElementById('targetBody').value = '';
        }

        // ===== RECENT NOTIFICATIONS =====
        function addRecentNotification(title, body) {
            const container = document.getElementById('recentNotifs');
            if (container.querySelector('.text-sm') && container.querySelector('.text-sm').textContent ===
                'No notifications yet') {
                container.innerHTML = '';
            }
            const div = document.createElement('div');
            div.className = 'notification-item';
            div.innerHTML = `
                <b>${escHtml(title)}</b>
                <div class="text-sm">${escHtml(body)}</div>
                <div class="text-xs">${new Date().toLocaleTimeString()}</div>
            `;
            container.insertBefore(div, container.firstChild);

            // Keep only last 10
            while (container.children.length > 10) {
                container.removeChild(container.lastChild);
            }
        }

        // ===== FOREGROUND MESSAGES =====
        if (messaging) {
            messaging.onMessage((payload) => {
                console.log('📨 Foreground message received:', payload);
                const title = payload.notification?.title || payload.data?.title || 'Glosax';
                const body = payload.notification?.body || payload.data?.body || '';
                addRecentNotification(title, body);
                showToast('📨 ' + title);

                // Show custom in-app notification
                if (Notification.permission === 'granted') {
                    const options = {
                        body: body,
                        icon: '/icon-192x192.png',
                        badge: '/badge-72x72.png',
                        vibrate: vibrateEnabled ? [200, 100, 200] : [],
                        silent: !soundEnabled,
                    };
                    new Notification(title, options);
                }
            });

            messaging.onTokenRefresh(() => {
                messaging.getToken({ vapidKey: VAPID_KEY }).then((refreshedToken) => {
                    console.log('🔄 Token refreshed:', refreshedToken);
                    currentToken = refreshedToken;
                    document.getElementById('tokenDisplay').textContent = refreshedToken;
                    const userId = localStorage.getItem('glosax_push_uid');
                    if (userId) {
                        db.ref('pushTokens/' + userId + '/token').set(refreshedToken);
                    }
                }).catch((err) => {
                    console.log('Unable to retrieve refreshed token', err);
                });
            });
        }

        // ===== TOGGLE SETTINGS =====
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').classList.toggle('active', soundEnabled);
            const userId = localStorage.getItem('glosax_push_uid');
            if (userId && currentToken) {
                db.ref('pushTokens/' + userId + '/soundEnabled').set(soundEnabled);
            }
            showToast(soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF');
        }

        function toggleVibrate() {
            vibrateEnabled = !vibrateEnabled;
            document.getElementById('vibrateToggle').classList.toggle('active', vibrateEnabled);
            const userId = localStorage.getItem('glosax_push_uid');
            if (userId && currentToken) {
                db.ref('pushTokens/' + userId + '/vibrateEnabled').set(vibrateEnabled);
            }
            showToast(vibrateEnabled ? '📳 Vibration ON' : '📳 Vibration OFF');
        }

        // ===== DELETE TOKEN =====
        async function deleteToken() {
            if (!currentToken) {
                showToast('No token to delete');
                return;
            }
            try {
                if (messaging) {
                    await messaging.deleteToken();
                }
                const userId = localStorage.getItem('glosax_push_uid');
                if (userId) {
                    await db.ref('pushTokens/' + userId).remove();
                    localStorage.removeItem('glosax_push_uid');
                }
                currentToken = null;
                document.getElementById('tokenDisplay').textContent = 'Not generated yet';
                document.getElementById('enableBtn').textContent = '🔔 Enable Push Notifications';
                document.getElementById('enableBtn').style.background = '#2aabee';
                updatePermStatus();
                showToast('🗑️ Token deleted');
            } catch (error) {
                console.error('Error deleting token:', error);
                showToast('Failed to delete token');
            }
        }

        // ===== TOAST =====
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // ===== ESCAPE HTML =====
        function escHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text || '').replace(/[&<>"']/g, m => map[m]);
        }

        // ===== INIT: Check existing permission =====
        if (Notification.permission === 'granted' && messaging) {
            navigator.serviceWorker.getRegistration().then(swReg => {
                messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg }).then(token => {
                    if (token) {
                        currentToken = token;
                        document.getElementById('tokenDisplay').textContent = token;
                        document.getElementById('enableBtn').textContent =
                        '✅ Notifications Enabled';
                        document.getElementById('enableBtn').style.background = '#4caf50';
                    }
                }).catch(err => console.log('Token retrieval error:', err));
            });
        }

        // ===== LOAD RECENT FROM DATABASE =====
        db.ref('notifications').orderByChild('timestamp').limitToLast(10).on('value', snapshot => {
            const data = snapshot.val();
            if (data) {
                const container = document.getElementById('recentNotifs');
                container.innerHTML = '';
                Object.values(data).reverse().forEach(notif => {
                    const div = document.createElement('div');
                    div.className = 'notification-item';
                    div.innerHTML = `
                        <b>${escHtml(notif.title || '')}</b>
                        <div class="text-sm">${escHtml(notif.body || '')}</div>
                        <div class="text-xs">${new Date(notif.timestamp).toLocaleString()}</div>
                    `;
                    container.appendChild(div);
                });
            }
        });
    </script>
</body>
</html>
